<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Loop Creator - Cloud Orchestrator v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: none; overflow: hidden; background-color: #020617; color: #f1f5f9; font-family: sans-serif; }
        
        /* マイクロアニメーション: 全体のフェードイン */
        #canvas-container { 
            position: relative; 
            width: 100vw; 
            height: calc(100vh - 80px); 
            overflow: hidden; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .orbit-guide {
            fill: none;
            stroke: rgba(16, 185, 129, 0.06);
            stroke-width: 2;
        }

        /* マイクロアニメーション: ノードの挙動 */
        .node { 
            position: absolute; 
            padding: 10px 18px; 
            background: rgba(15, 23, 42, 0.95); 
            border: 2px solid #10b981; 
            border-radius: 9999px; 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); 
            user-select: none;
            z-index: 20;
            min-width: 100px;
            text-align: center;
            font-weight: 700;
            color: #fff;
            backdrop-filter: blur(12px);
            transform: translate(-50%, -50%);
            font-size: 13px; 
            transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        top 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        border-color 0.3s ease;
            cursor: pointer;
        }
        .node:hover { transform: translate(-50%, -50%) scale(1.08); border-color: #34d399; }
        .node:active { transform: translate(-50%, -50%) scale(0.95); }

        /* 解決策の雲（Cloud）の浮遊アニメーション */
        .solution-cloud {
            position: absolute;
            padding: 8px 14px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px dashed #34d399;
            border-radius: 20px;
            color: #a7f3d0;
            font-size: 10px;
            max-width: 120px;
            text-align: center;
            z-index: 15;
            transform: translate(-50%, -50%);
            backdrop-filter: blur(4px);
            pointer-events: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: floatCloud 6s ease-in-out infinite;
            transition: left 0.8s ease-in-out, top 0.8s ease-in-out;
        }

        @keyframes floatCloud {
            0%, 100% { transform: translate(-50%, -52%); }
            50% { transform: translate(-50%, -48%); }
        }
        
        .add-between-btn {
            position: absolute;
            width: 24px; height: 24px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.5);
            border-radius: 50%;
            color: #10b981;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: bold;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .add-between-btn:hover { background: #10b981; color: #020617; transform: translate(-50%, -50%) scale(1.3); }

        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .flow-line {
            fill: none; stroke-width: 3; stroke-dasharray: 12, 6;
            animation: flow 0.6s linear infinite;
        }
        @keyframes flow { from { stroke-dashoffset: 36; } to { stroke-dashoffset: 0; } }

        .label-s { fill: #10b981; font-weight: 900; font-size: 14px; opacity: 0.8; }
        .label-o { fill: #f43f5e; font-weight: 900; font-size: 14px; opacity: 0.8; }

        /* ビュー遷移アニメーション */
        #detail-view, #settings-view {
            display: none; position: fixed; inset: 0; background: #020617; z-index: 300; padding: 24px; overflow-y: auto;
        }
        .active-view { display: block !important; animation: slideIn 0.3s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 400; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .modal.active { display: flex; animation: fadeIn 0.2s ease; }
        
        .fab-add {
            position: fixed; bottom: 32px; right: 24px;
            width: 64px; height: 64px; background: #10b981; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900;
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4); z-index: 50; transition: all 0.2s;
        }
        .fab-add:active { transform: scale(0.9) rotate(90deg); }

        .sync-btn {
            position: fixed; top: 18px; right: 80px; 
            padding: 8px 12px; background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; border-radius: 12px;
            color: #10b981; font-size: 10px; font-weight: bold; z-index: 100; backdrop-filter: blur(8px);
        }
        .sync-btn:active { background: #10b981; color: #020617; }
        
        /* ぐるぐるローダー */
        .loader { width: 14px; height: 14px; border: 2px solid #10b981; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 bg-slate-900/90 border-b border-emerald-500/20 flex justify-between items-center backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center">
                <svg class="w-5 h-5 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div class="flex flex-col">
                <h1 class="text-sm font-black text-white tracking-tighter italic text-emerald-400">Cloud Orchestrator</h1>
                <span class="text-[7px] text-slate-500 font-black uppercase tracking-[0.3em]">v14.0 nimogram sync</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="openSettings()" class="p-2 text-slate-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></button>
            <button onclick="clearCanvas()" class="px-3 py-1.5 text-[8px] bg-red-900/10 text-red-500 border border-red-500/20 rounded-full font-bold">RESET</button>
        </div>
    </header>

    <button onclick="cloudSync()" class="sync-btn flex items-center gap-2">
        <span id="sync-icon">☁️ SYNC</span>
        <div id="sync-loader" class="loader"></div>
    </button>

    <div id="canvas-container">
        <div id="dynamic-layer" class="w-full h-full relative">
            <svg id="svg-layer">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/></marker>
                    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e"/></marker>
                </defs>
                <circle id="orbit-path" class="orbit-guide"></circle>
            </svg>
        </div>
    </div>

    <!-- Settings View -->
    <div id="settings-view">
        <div class="max-w-md mx-auto">
            <button onclick="closeSettings()" class="text-slate-400 font-bold mb-10">← Cancel</button>
            <h2 class="text-2xl font-black mb-8 text-emerald-400">Settings</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] text-slate-500 font-black uppercase mb-2 block">GAS Web App URL</label>
                    <input type="text" id="gas-url" class="w-full p-4 bg-slate-900 border border-slate-800 text-white rounded-xl focus:border-emerald-500 outline-none font-mono text-xs" placeholder="https://script.google.com/macros/s/.../exec">
                </div>
                <button onclick="saveSettings()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black">APPLY CONFIG</button>
            </div>
        </div>
    </div>

    <!-- Detail View -->
    <div id="detail-view">
        <div class="max-w-md mx-auto h-full flex flex-col pb-10">
            <button onclick="closeDetail()" class="text-slate-400 font-bold mb-6">← Close</button>
            <div id="detail-node-label" class="text-2xl font-black text-emerald-400 mb-8 border-l-4 border-emerald-500 pl-4">Variable Name</div>
            <div class="flex-1 bg-slate-900/50 rounded-3xl border border-slate-800 p-6 mb-6">
                <textarea id="solution-input" class="w-full h-full bg-transparent text-white outline-none resize-none leading-relaxed text-sm" placeholder="具体的なアクションプランを入力..."></textarea>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="saveSolution()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">SAVE TO LOCAL</button>
                <button onclick="deleteCurrentNode()" class="text-xs text-red-500 font-bold opacity-50 hover:opacity-100 transition">DELETE THIS ELEMENT</button>
            </div>
        </div>
    </div>

    <button id="main-fab" onclick="openNodeModal()" class="fab-add">＋</button>

    <div id="bottom-nav" class="fixed bottom-0 left-0 w-full p-6 pr-24 flex items-center pointer-events-none">
        <button id="connect-btn" onclick="toggleConnectMode()" class="pointer-events-auto px-6 py-3 bg-slate-800/90 text-slate-400 border border-slate-700 rounded-xl font-black text-[10px] shadow-2xl backdrop-blur-md">極性切替</button>
    </div>

    <!-- Modals -->
    <div id="node-modal" class="modal p-6">
        <div class="bg-slate-900 border border-emerald-500/30 p-8 rounded-[2.5rem] w-full max-w-sm">
            <h2 class="text-lg font-black mb-1 text-white text-center uppercase italic">Add Element</h2>
            <input type="text" id="node-input" class="w-full p-4 bg-slate-800/50 border border-slate-700 text-white rounded-xl mb-6 focus:border-emerald-500 outline-none font-bold text-center text-lg" placeholder="...">
            <div class="flex gap-3">
                <button onclick="closeNodeModal()" class="flex-1 py-4 text-slate-500 font-bold">CANCEL</button>
                <button onclick="addNode()" class="flex-[2] py-4 bg-emerald-600 text-white rounded-xl font-black">ENGAGE</button>
            </div>
        </div>
    </div>

    <div id="conn-modal" class="modal p-6">
        <div class="bg-slate-900 border border-emerald-500/30 p-8 rounded-[2.5rem] w-full max-w-sm text-center">
            <h2 class="text-md font-black mb-6 text-white uppercase italic">極性を反転</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="completeConnection('S')" class="p-6 bg-emerald-950/20 border border-emerald-500/20 rounded-2xl">
                    <div class="text-4xl font-black text-emerald-500 mb-1">S</div>
                    <div class="text-[8px] text-emerald-400 font-bold uppercase tracking-widest">Reinforce</div>
                </button>
                <button onclick="completeConnection('O')" class="p-6 bg-red-950/20 border-2 border-red-500/20 rounded-2xl transition-all group">
                    <div class="text-4xl font-black text-red-500 mb-2 group-hover:scale-110 transition">O</div>
                    <div class="text-[8px] text-red-400 font-bold uppercase tracking-widest">Balance</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        let nodes = [];
        let connections = [];
        let solutions = {};
        let isConnectMode = false;
        let selectedNodeId = null;
        let isRotating = true;
        let rotationAngle = 0;
        let pendingInsertIndex = -1;
        let currentDetailNodeId = null;
        let gasUrl = localStorage.getItem('gas_url') || "";

        const dynamicLayer = document.getElementById('dynamic-layer');
        const svg = document.getElementById('svg-layer');
        const orbitPath = document.getElementById('orbit-path');

        window.onload = () => {
            const saved = localStorage.getItem('system_loops_v14');
            if (saved) {
                const data = JSON.parse(saved);
                nodes = data.nodes || [];
                connections = data.connections || [];
                solutions = data.solutions || {};
            }
            document.getElementById('gas-url').value = gasUrl;
            updateOrbitUI();
            distributeNodes();
            render();
            requestAnimationFrame(animate);
        };

        window.onresize = updateOrbitUI;

        function updateOrbitUI() {
            const centerX = window.innerWidth / 2;
            const centerY = (window.innerHeight - 80) / 2;
            const radius = Math.min(window.innerWidth, window.innerHeight - 80) * 0.38;
            orbitPath.setAttribute("cx", centerX);
            orbitPath.setAttribute("cy", centerY);
            orbitPath.setAttribute("r", radius);
        }

        function animate() {
            const isAnyViewOpen = document.querySelector('.active-view') || document.querySelector('.modal.active');
            if (isRotating && nodes.length > 0 && !isAnyViewOpen) {
                rotationAngle += 0.0035;
                render();
            }
            requestAnimationFrame(animate);
        }

        function distributeNodes() {
            if (nodes.length === 0) return;
            nodes.forEach((node, index) => {
                node.baseAngle = (index / nodes.length) * 2 * Math.PI;
            });
            autoConnectLoop();
        }

        function autoConnectLoop() {
            if (nodes.length < 2) { connections = []; return; }
            const typeMap = {};
            connections.forEach(c => typeMap[`${c.source}-${c.target}`] = c.type);
            const newConnections = [];
            for (let i = 0; i < nodes.length; i++) {
                const source = nodes[i].id;
                const target = nodes[(i + 1) % nodes.length].id;
                newConnections.push({
                    id: `${source}-${target}`, source, target,
                    type: typeMap[`${source}-${target}`] || 'S'
                });
            }
            connections = newConnections;
        }

        /* ---------------- GAS Integration ---------------- */
        async function cloudSync() {
            if (!gasUrl) { alert("SettingsからGASのURLを設定してください"); return; }
            
            const icon = document.getElementById('sync-icon');
            const loader = document.getElementById('sync-loader');
            icon.style.display = 'none';
            loader.style.display = 'block';

            try {
                // 保存
                const res = await fetch(gasUrl, {
                    method: 'POST',
                    body: JSON.stringify({ nodes, connections, solutions })
                });
                
                // 取得（同期）
                const getRes = await fetch(gasUrl);
                const cloudData = await getRes.json();
                
                if (cloudData.nodes) {
                    nodes = cloudData.nodes;
                    connections = cloudData.connections;
                    solutions = cloudData.solutions;
                    distributeNodes();
                    render();
                    localStorage.setItem('system_loops_v14', JSON.stringify(cloudData));
                }
                alert("クラウド同期が完了しました");
            } catch (e) {
                console.error(e);
                alert("通信エラーが発生しました。URLを確認してください。");
            } finally {
                icon.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        function openSettings() { document.getElementById('settings-view').classList.add('active-view'); }
        function closeSettings() { document.getElementById('settings-view').classList.remove('active-view'); }
        function saveSettings() {
            gasUrl = document.getElementById('gas-url').value;
            localStorage.setItem('gas_url', gasUrl);
            alert("URLを保存しました");
            closeSettings();
        }

        /* ---------------- Core UI Logic ---------------- */
        function openNodeModal(insertAt = -1) {
            pendingInsertIndex = insertAt;
            document.getElementById('node-modal').classList.add('active');
            setTimeout(() => document.getElementById('node-input').focus(), 100);
        }
        function closeNodeModal() { document.getElementById('node-modal').classList.remove('active'); document.getElementById('node-input').value = ''; }
        function addNode() {
            const label = document.getElementById('node-input').value;
            if (!label) return;
            const newNode = { id: Date.now(), label, baseAngle: Math.PI / 2 };
            if (pendingInsertIndex === -1) nodes.push(newNode);
            else nodes.splice(pendingInsertIndex + 1, 0, newNode);
            distributeNodes(); closeNodeModal(); render();
        }

        function toggleConnectMode() {
            isConnectMode = !isConnectMode;
            const btn = document.getElementById('connect-btn');
            btn.className = isConnectMode ? 
                "pointer-events-auto px-6 py-3 bg-amber-500 text-slate-950 rounded-xl font-black text-[10px] shadow-xl" :
                "pointer-events-auto px-6 py-3 bg-slate-800/90 text-slate-400 border border-slate-700 rounded-xl font-black text-[10px] shadow-xl backdrop-blur-md";
            btn.innerText = isConnectMode ? 'ターゲットを選択...' : '極性切替';
            if (!isConnectMode) selectedNodeId = null;
            render();
        }

        function handleNodeClick(id) {
            if (isConnectMode) {
                if (selectedNodeId === null) { selectedNodeId = id; document.getElementById('connect-btn').innerText = '次の要素を選択'; }
                else if (selectedNodeId !== id) { tempTargetId = id; document.getElementById('conn-modal').classList.add('active'); }
                render();
            } else { openDetail(id); }
        }

        function openDetail(id) {
            const node = nodes.find(n => n.id === id);
            if (!node) return;
            currentDetailNodeId = id;
            document.getElementById('detail-node-label').innerText = node.label;
            document.getElementById('solution-input').value = solutions[id] || "";
            document.getElementById('detail-view').classList.add('active-view');
        }
        function closeDetail() { document.getElementById('detail-view').classList.remove('active-view'); render(); }
        function saveSolution() {
            if (currentDetailNodeId) {
                solutions[currentDetailNodeId] = document.getElementById('solution-input').value;
                syncLocal(); closeDetail();
            }
        }
        function deleteCurrentNode() {
            if (confirm("要素を削除しますか？")) {
                nodes = nodes.filter(n => n.id !== currentDetailNodeId);
                connections = connections.filter(c => c.source !== currentDetailNodeId && c.target !== currentDetailNodeId);
                delete solutions[currentDetailNodeId];
                distributeNodes(); syncLocal(); closeDetail();
            }
        }

        let tempTargetId = null;
        function completeConnection(type) {
            const conn = connections.find(c => c.source === selectedNodeId && c.target === tempTargetId);
            if (conn) conn.type = type;
            document.getElementById('conn-modal').classList.remove('active');
            toggleConnectMode(); render();
        }

        function getRotatedPos(node, extraRadius = 0) {
            const centerX = window.innerWidth / 2;
            const centerY = (window.innerHeight - 80) / 2;
            const radius = Math.min(window.innerWidth, window.innerHeight - 80) * 0.38 + extraRadius;
            const currentAngle = node.baseAngle + (isRotating ? rotationAngle : 0);
            return { x: centerX + radius * Math.cos(currentAngle), y: centerY + radius * Math.sin(currentAngle), angle: currentAngle };
        }

        function render() {
            const currentIds = nodes.map(n => n.id.toString());
            document.querySelectorAll('.node, .add-between-btn, .solution-cloud').forEach(el => {
                if (el.classList.contains('node') && !currentIds.includes(el.dataset.id)) el.remove();
                if (!el.classList.contains('node')) el.remove();
            });

            const nodeData = nodes.map(node => ({
                id: node.id, label: node.label, pos: getRotatedPos(node), solution: solutions[node.id] || ""
            }));

            nodeData.forEach(data => {
                let div = document.querySelector(`.node[data-id="${data.id}"]`);
                if (!div) {
                    div = document.createElement('div'); div.className = 'node'; div.dataset.id = data.id;
                    div.addEventListener('click', () => handleNodeClick(data.id));
                    dynamicLayer.appendChild(div);
                }
                div.style.left = data.pos.x + 'px'; div.style.top = data.pos.y + 'px';
                div.textContent = data.label;
                div.classList.toggle('selected', selectedNodeId === data.id);

                if (data.solution && !isConnectMode) {
                    const cloudPos = getRotatedPos(nodes.find(n => n.id === data.id), 65);
                    const cloud = document.createElement('div'); cloud.className = 'solution-cloud';
                    cloud.style.left = cloudPos.x + 'px'; cloud.style.top = cloudPos.y + 'px';
                    cloud.textContent = data.solution;
                    cloud.onclick = () => openDetail(data.id);
                    dynamicLayer.appendChild(cloud);
                }
            });

            while (svg.lastChild && svg.lastChild.nodeName !== 'defs' && svg.lastChild.id !== 'orbit-path') svg.removeChild(svg.lastChild);

            const centerX = window.innerWidth / 2;
            const centerY = (window.innerHeight - 80) / 2;
            const radius = Math.min(window.innerWidth, window.innerHeight - 80) * 0.38;

            connections.forEach((conn, index) => {
                const sData = nodeData.find(d => d.id === conn.source);
                const tData = nodeData.find(d => d.id === conn.target);
                if (!sData || !tData) return;
                const s = sData.pos; const t = tData.pos;
                let diff = (t.angle - s.angle) % (2 * Math.PI); if (diff < 0) diff += 2 * Math.PI;
                const largeArc = diff > Math.PI ? 1 : 0;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${s.x} ${s.y} A ${radius} ${radius} 0 ${largeArc} 1 ${t.x} ${t.y}`);
                path.setAttribute("class", "flow-line");
                path.setAttribute("stroke", conn.type === 'S' ? '#10b981' : '#f43f5e');
                path.setAttribute("marker-end", conn.type === 'S' ? "url(#arrowhead)" : "url(#arrowhead-red)");
                svg.appendChild(path);
                const midAngle = s.angle + diff / 2;
                const labelX = centerX + (radius + 28) * Math.cos(midAngle);
                const labelY = centerY + (radius + 28) * Math.sin(midAngle);
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", labelX); text.setAttribute("y", labelY);
                text.setAttribute("class", conn.type === 'S' ? 'label-s' : 'label-o');
                text.setAttribute("text-anchor", "middle"); text.setAttribute("dominant-baseline", "middle");
                text.textContent = conn.type; svg.appendChild(text);

                if (!isConnectMode) {
                    const btn = document.createElement('div'); btn.className = 'add-between-btn'; btn.innerHTML = '＋';
                    const btnX = centerX + radius * Math.cos(midAngle); const btnY = centerY + radius * Math.sin(midAngle);
                    btn.style.left = btnX + 'px'; btn.style.top = btnY + 'px';
                    btn.onclick = (e) => { e.stopPropagation(); openNodeModal(index); };
                    dynamicLayer.appendChild(btn);
                }
            });
            syncLocal();
        }

        function syncLocal() { localStorage.setItem('system_loops_v14', JSON.stringify({nodes, connections, solutions})); }
        function clearCanvas() { if(confirm("全リセットしますか？")) { localStorage.removeItem('system_loops_v14'); nodes=[]; connections=[]; solutions={}; render(); } }
    </script>
</body>
</html>
