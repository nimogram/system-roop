<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System Loop Creator v25.6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* Absolute Default: Emerald & Lime */
            --emerald: #10b981;
            --lime: #bef264;
            --c: var(--emerald);
            --cl: var(--lime);
            --grad: linear-gradient(135deg, var(--emerald), var(--lime));
            --bg: #050c1a;
            --bg2: #0b1628;
            --bg3: #111e35;
            --border: rgba(255,255,255,0.06);
            --text: #e2e8f0;
            --mute: #4a5a72;
            --danger: #f87171;
            --radius-pill: 9999px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --header-h: 58px;
            --banner-h: 60px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
        }

        header {
            height: var(--header-h);
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 14px; flex-shrink: 0; z-index: 100;
        }

        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { width: 32px; height: 32px; background: var(--grad); border-radius: 8px; display: grid; place-items: center; }
        .brand-icon svg { width: 16px; height: 16px; color: #050c1a; }
        .brand-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: var(--emerald); letter-spacing: -0.3px; line-height: 1; }
        .brand-sub { font-size: 8px; color: var(--mute); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

        .hacts { display: flex; align-items: center; gap: 6px; }
        .hbtn {
            height: 30px; padding: 0 10px;
            background: transparent; border: 1.2px solid var(--emerald); border-radius: 8px;
            color: var(--emerald); font-family: 'Space Mono', monospace;
            font-size: 9px; font-weight: 600; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
        }
        .hbtn:hover { background: var(--grad); color: var(--bg); border-color: transparent; }
        .hbtn-ic { width: 32px; height: 32px; padding: 0; border: none; background: transparent; color: var(--mute); display: grid; place-items: center; cursor: pointer; }

        #hint-banner {
            height: var(--banner-h); background: var(--bg2); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; padding: 0 20px; flex-shrink: 0; position: relative; z-index: 90;
        }
        #hint-banner::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--grad); }
        #hint-text { font-size: 13px; font-weight: 600; color: var(--emerald); text-align: center; line-height: 1.5; max-width: 90%; }
        #hint-cursor { display: inline-block; width: 2px; height: 14px; background: var(--emerald); margin-left: 2px; vertical-align: middle; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* CANVAS - The center is absolute screen center */
        #canvas-container { 
            position: fixed; 
            inset: 0; 
            overflow: hidden; 
            background: transparent; 
            z-index: 10;
            pointer-events: none;
        }
        #canvas-container::before {
            content: ''; position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }

        #svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
        #dynamic-layer { position: absolute; inset: 0; pointer-events: none; }
        #dynamic-layer > * { pointer-events: auto; }

        .ring-path { fill: none; stroke: var(--emerald); stroke-width: 2.5; opacity: 0.12; stroke-linecap: round; }
        .flow-line-tapered { stroke: none; opacity: 0.9; }

        .node {
            position: absolute; padding: 10px 24px;
            background: var(--bg2); border: 2px solid var(--emerald); border-radius: var(--radius-pill);
            font-family: sans-serif; font-size: 13px; font-weight: 700;
            color: #fff; text-align: center; white-space: nowrap; user-select: none;
            cursor: grab; z-index: 30; transform: translate(-50%, -50%); min-width: 90px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: border-color 0.4s;
        }
        .node.sel { border-color: var(--lime); box-shadow: 0 0 15px var(--lime); }
        .node-dot {
            position: absolute; top: -5px; right: -5px;
            width: 14px; height: 14px; background: var(--lime); border-radius: 50%;
            border: 2px solid var(--bg); z-index: 35;
        }

        .pol-circle {
            position: absolute; width: 22px; height: 22px;
            background: var(--bg2); border-radius: 50%; border: 1.5px solid var(--emerald);
            display: flex; align-items: center; justify-content: center;
            color: var(--emerald); font-size: 11px; font-weight: 800;
            z-index: 20; transform: translate(-50%, -50%); cursor: pointer;
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
        }
        .pol-label { position: absolute; color: var(--lime); font-weight: 900; font-size: 13px; transform: translate(-50%, -50%); pointer-events: none; }

        .sol-cloud {
            position: absolute; padding: 8px 16px;
            background: rgba(11, 22, 40, 0.97); border: 1.2px dashed var(--emerald); border-radius: 12px;
            color: #fff; font-size: 11px; font-family: sans-serif; font-weight: 600;
            max-width: 180px; text-align: center; z-index: 25; cursor: pointer;
            transform: translate(-50%, -50%); backdrop-filter: blur(10px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }

        #pager { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all 0.3s; }
        .dot.on { background: var(--emerald); transform: scale(1.5); }

        .btn-reset-fixed {
            position: fixed; bottom: 24px; left: 20px;
            height: 42px; padding: 0 20px;
            background: transparent; border: 1.8px solid var(--danger); border-radius: 12px;
            color: var(--danger); font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; cursor: pointer; z-index: 100;
        }

        #conn-btn {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            height: 42px; padding: 0 28px;
            background: rgba(11, 22, 40, 0.85); border: 1.5px solid var(--border); border-radius: var(--radius-pill);
            color: var(--mute); font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 600;
            cursor: pointer; z-index: 100; backdrop-filter: blur(16px);
        }
        #conn-btn.on { background: var(--grad); color: var(--bg); border-color: transparent; }

        .fab {
            position: fixed; bottom: 24px; right: 20px;
            width: 68px; height: 68px; border-radius: 50%;
            display: grid; place-items: center;
            background: var(--grad); color: var(--bg);
            font-size: 36px; font-weight: 800; cursor: pointer; z-index: 100;
            box-shadow: 0 10px 28px rgba(16, 185, 129, 0.4); border: none;
        }

        .view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 300; overflow-y: auto; }
        .view.open { display: block; }
        .v-inner { max-width: 440px; margin: 0 auto; padding: 24px 24px 80px; }
        .v-back { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--mute); font-size: 11px; font-weight: 600; cursor: pointer; margin-bottom: 24px; }
        
        .btn-p { 
            width: 100%; padding: 16px 20px; 
            background: var(--grad); color: var(--bg); border: none; border-radius: var(--radius-md); 
            font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; 
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
        }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 400; align-items: center; justify-content: center; padding: 20px; }
        .overlay.open { display: flex; }
        .ov-card { background: var(--bg2); border: 2.5px solid var(--emerald); border-radius: 28px; padding: 32px; width: 100%; max-width: 380px; }
        
        input[type="text"] { 
            width: 100%; background: var(--bg2) !important; border: 2px solid var(--border) !important; 
            border-radius: var(--radius-md) !important; padding: 16px 20px !important; 
            color: var(--text) !important; font-family: 'Space Mono', monospace !important; font-size: 15px !important; outline: none; margin-bottom: 14px;
        }

        #empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; pointer-events: none; z-index: 5; }
        .em-ring { width: 64px; height: 64px; border: 3px dashed var(--mute); border-radius: 50%; display: grid; place-items: center; opacity: 0.4; }
        .em-t { font-family:'Syne',sans-serif; font-size: 16px; font-weight: 700; color: var(--mute); opacity: 0.6; }
    </style>
</head>
<body oncontextmenu="return false;">

<header>
    <div class="brand">
        <div class="brand-icon" id="bi">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </div>
        <div>
            <div class="brand-name" id="tname">Track 1</div>
            <div class="brand-sub">System Loop Creator</div>
        </div>
    </div>
    <div class="hacts">
        <button class="hbtn" onclick="newTrack()">New</button>
        <button class="hbtn" onclick="alignOrbit()">Align</button>
        <button class="hbtn" id="rot-btn" onclick="toggleRot()">Stop</button>
        <button class="hbtn">Sync</button>
        <button class="hbtn-ic" onclick="toast('Settings locked.')">
            <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
    </div>
</header>

<div id="hint-banner"><span id="hint-text"></span><span id="hint-cursor"></span></div>

<div id="canvas-container">
    <svg id="svg-layer">
        <defs id="svg-defs"></defs>
        <circle id="orbit-ring" class="ring-path" cx="50%" cy="50%" r="0"></circle>
    </svg>
    <div id="dynamic-layer"></div>
    <div id="empty">
        <div class="em-ring"><svg width="28" height="28" fill="none" stroke="#4a5a72" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg></div>
        <div class="em-t">ループが空です</div>
    </div>
</div>

<div id="pager"></div>
<div id="toasts"></div>

<button class="btn-reset-fixed" onclick="openReset()">RESET</button>
<button id="conn-btn" onclick="toggleConn()">Polarity Snap</button>
<button class="fab" onclick="openInject()">＋</button>

<!-- Modals -->
<div class="overlay" id="inj-ov">
    <div class="ov-card">
        <div style="font-family:'Syne';font-size:20px;font-weight:800;color:var(--emerald);text-align:center;margin-bottom:20px;">Inject Variable</div>
        <input type="text" id="node-inp" placeholder="Variable Name...">
        <div style="display:flex;gap:12px;">
            <button style="flex:1;padding:14px;background:transparent;border:1.5px solid var(--border);border-radius:12px;color:var(--mute);font-size:11px;font-weight:600;" onclick="closeInject()">Cancel</button>
            <button class="btn-p" onclick="addNode()">INJECT</button>
        </div>
    </div>
</div>

<div class="view" id="detail-view">
    <div class="v-inner">
        <button class="v-back" onclick="closeDetail()">← Back</button>
        <div id="det-name" style="font-family:'Syne';font-size:24px;font-weight:800;color:var(--emerald);margin-bottom:20px;">Variable</div>
        <div class="card">
            <div style="font-size:10px;color:var(--mute);margin-bottom:10px;font-weight:700;text-transform:uppercase;">Action Plans</div>
            <div id="plan-list"></div>
            <div style="display:flex;gap:10px;margin-top:10px;">
                <input type="text" id="plan-inp" placeholder="Next step...">
                <button onclick="addPlan()" style="width:60px;height:52px;background:var(--grad);color:var(--bg);border:none;border-radius:12px;font-size:24px;font-weight:800;">+</button>
            </div>
        </div>
        <button class="btn-p" style="background:transparent; border:1.5px solid var(--danger); color:var(--danger); font-size:12px;" onclick="delNode()">Delete Node</button>
    </div>
</div>

<div class="overlay" id="reset-ov">
    <div class="ov-card">
        <div style="font-family:'Syne';font-size:20px;font-weight:800;color:var(--danger);text-align:center;margin-bottom:10px;">Clear Loop</div>
        <p style="text-align:center;font-size:12px;color:var(--mute);margin-bottom:20px;">現在の全データを消去します。</p>
        <div style="display:flex;gap:12px;">
            <button style="flex:1;padding:14px;background:transparent;border:1.5px solid var(--border);border-radius:12px;color:var(--mute);font-size:11px;font-weight:600;" onclick="closeReset()">Cancel</button>
            <button class="btn-p" style="background:var(--danger);box-shadow:none;" onclick="clearLoop()">CLEAR</button>
        </div>
    </div>
</div>

<script>
const PAL = [{m:'#10b981',l:'#bef264'}, {m:'#06b6d4',l:'#a5f3fc'}, {m:'#8b5cf6',l:'#ddd6fe'}, {m:'#f59e0b',l:'#fef3c7'}, {m:'#ec4899',l:'#fbcfe8'}, {m:'#3b82f6',l:'#bfdbfe'}];
const HINTS = ["「同じ問題が形を変えて何度も起きる」時、そこには必ず隠れたループがある。", "犯人を探すのをやめ、構造を探す。", "レバレッジポイントは、常に直感に反する場所にある。", "システムの挙動は、その目的と構造によって決定される。", "因果の根源を見極めるのが参謀の仕事です。"];

let tracks=[], cur=0, isRot=true, rotAng=0, orbitAng=0, isConn=false, selId=null, dragId=null, detId=null, txStart=0;

const $ = id => document.getElementById(id);
const dyn = $('dynamic-layer'), svg = $('svg-layer'), defs = $('svg-defs');

window.onload = () => {
    const saved = localStorage.getItem('nimoloop_v25_6_absolute');
    if (saved) tracks = JSON.parse(saved);
    if (!tracks.length) tracks = [mkT('Track 1')];
    applyTheme(); renderPager(); typeHint();
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('resize', render);
    
    // Swipe for new track logic
    document.body.addEventListener('touchstart', e => { txStart = e.touches[0].clientX; }, {passive:true});
    document.body.addEventListener('touchend', e => {
        if (document.querySelector('.view.open, .overlay.open')) return;
        const dx = e.changedTouches[0].clientX - txStart;
        if (Math.abs(dx) > 80) switchT(cur + (dx > 0 ? -1 : 1));
    });
    
    requestAnimationFrame(loop);
};

function mkT(name) {
    const randomPal = PAL[Math.floor(Math.random()*PAL.length)];
    // Default to Emerald/Lime for the very first track
    const chosenPal = (tracks.length === 0) ? PAL[0] : randomPal;
    return { id: Date.now()+Math.random(), name, nodes:[], conns:[], sols:{}, cp: chosenPal };
}

function applyTheme() {
    const t = tracks[cur];
    document.documentElement.style.setProperty('--emerald', t.cp.m);
    document.documentElement.style.setProperty('--lime', t.cp.l);
    $('tname').textContent = t.name;
    $('tname').style.color = t.cp.m;
    $('bi').style.background = `linear-gradient(135deg, ${t.cp.m}, ${t.cp.l})`;
    document.querySelectorAll('.btn-p').forEach(btn => {
        if (!btn.style.background.includes('transparent')) btn.style.background = `linear-gradient(135deg, ${t.cp.m}, ${t.cp.l})`;
    });
}

function renderPager() {
    const p = $('pager'); p.innerHTML = '';
    tracks.forEach((t, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i===cur?' on':'');
        if (i===cur) d.style.background = t.cp.m;
        p.appendChild(d);
    });
}

function loop() {
    const modalOpen = document.querySelector('.view.open, .overlay.open');
    if (isRot && tracks[cur].nodes.length > 0 && !dragId && !modalOpen) {
        rotAng += 0.003; orbitAng -= 0.005;
        render();
    }
    requestAnimationFrame(loop);
}

/* Absolute Center Calculation (Whole Device Screen) */
function ctr() { return { x: window.innerWidth / 2, y: window.innerHeight / 2 }; }
function getR() { return Math.min(window.innerWidth, window.innerHeight) * 0.35; }

function getPos(n) {
    const c = ctr(), r = getR(), a = (n.angle || 0) + rotAng;
    return { x: c.x + r * Math.cos(a), y: c.y + r * Math.sin(a), a, r };
}

function getTaperedPath(s, tg, r) {
    const steps = 40; const center = ctr();
    let diff = (tg.a - s.a) % (2 * Math.PI); if (diff < 0) diff += 2 * Math.PI;
    if (diff < 0.1) return "";
    const op = []; const ip = [];
    for (let i = 0; i <= steps; i++) {
        const ratio = i / steps, ang = s.a + diff * ratio, w = 7.0 - (6.2 * ratio);
        op.push({ x: center.x + (r + w) * Math.cos(ang), y: center.y + (r + w) * Math.sin(ang) });
        ip.unshift({ x: center.x + (r - w) * Math.cos(ang), y: center.y + (r - w) * Math.sin(ang) });
    }
    return `M ${op[0].x} ${op[0].y} ` + op.slice(1).concat(ip).map(p => `L ${p.x} ${p.y}`).join(' ') + ' Z';
}

function render() {
    const t = tracks[cur], c = ctr(), radius = getR();
    const activeIds = new Set(t.nodes.map(n => String(n.id)));
    
    const ring = $('orbit-ring');
    ring.setAttribute('cx', c.x); ring.setAttribute('cy', c.y);
    ring.setAttribute('r', radius); ring.style.stroke = t.cp.m;
    
    while(svg.lastChild && svg.lastChild.id !== 'svg-defs' && svg.lastChild.id !== 'orbit-ring') svg.removeChild(svg.lastChild);
    while(defs.lastChild) defs.removeChild(defs.lastChild);
    
    document.querySelectorAll('.node, .sol-cloud, .pol-circle, .pol-label').forEach(el => {
        if (!activeIds.has(String(el.dataset.id)) && !el.classList.contains('pol-circle')) el.remove();
        if (el.classList.contains('pol-circle') || el.classList.contains('pol-label')) el.remove();
    });

    t.conns.forEach(conn => {
        const sn = t.nodes.find(n => n.id === conn.s), tn = t.nodes.find(n => n.id === conn.t);
        if (!sn || !tn) return;
        const s = getPos(sn), tg = getPos(tn), isS = conn.type === 'S', gid = `g-${conn.id}`;
        const grad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
        grad.setAttribute('id', gid); grad.setAttribute('gradientUnits','userSpaceOnUse');
        grad.setAttribute('x1', s.x); grad.setAttribute('y1', s.y); grad.setAttribute('x2', tg.x); grad.setAttribute('y2', tg.y);
        [[0, isS?t.cp.m:'#f43f5e'], [1, isS?t.cp.l:'#f87171']].forEach(([off, col]) => {
            const st = document.createElementNS('http://www.w3.org/2000/svg','stop');
            st.setAttribute('offset', off*100+'%'); st.setAttribute('stop-color', col); grad.appendChild(st);
        });
        defs.appendChild(grad);
        const d = getTaperedPath(s, tg, radius);
        if (d) {
            const path = document.createElementNS('http://www.w3.org/2000/svg','path');
            path.setAttribute('d', d); path.setAttribute('fill', `url(#${gid})`); path.setAttribute('class','flow-line-tapered'); svg.appendChild(path);
        }
        const head = document.createElementNS('http://www.w3.org/2000/svg','polygon');
        const hs = 13;
        const p1 = { x: tg.x + hs*Math.cos(tg.a), y: tg.y + hs*Math.sin(tg.a) };
        const p2 = { x: tg.x + (hs/2)*Math.cos(tg.a+2.5), y: tg.y + (hs/2)*Math.sin(tg.a+2.5) };
        const p3 = { x: tg.x + (hs/2)*Math.cos(tg.a-2.5), y: tg.y + (hs/2)*Math.sin(tg.a-2.5) };
        head.setAttribute('points', `${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}`);
        head.setAttribute('fill', isS ? t.cp.l : '#f87171'); svg.appendChild(head);

        let df = (tg.a - s.a) % (2 * Math.PI); if (df < 0) df += 2 * Math.PI;
        const midA = s.a + df/2, lx = c.x + radius*Math.cos(midA), ly = c.y + radius*Math.sin(midA);
        const pc = document.createElement('div'); pc.className='pol-circle'; pc.style.left=lx+'px'; pc.style.top=ly+'px'; pc.textContent='+'; pc.style.borderColor = isS?t.cp.m:'#f43f5e'; pc.style.color = isS?t.cp.m:'#f43f5e';
        pc.onclick = () => { if(!isRot) { conn.type = isS?'O':'S'; render(); sync(); } }; dyn.appendChild(pc);
        const pl = document.createElement('div'); pl.className='pol-label'; pl.style.left = (c.x + (radius+28)*Math.cos(midA))+'px'; pl.style.top = (c.y + (radius+28)*Math.sin(midA))+'px'; pl.textContent = conn.type; pl.style.color = isS?t.cp.l:'#f87171'; dyn.appendChild(pl);
    });

    t.nodes.forEach(n => {
        const p = getPos(n);
        let el = document.querySelector(`.node[data-id="${n.id}"]`);
        if (!el) { el=document.createElement('div'); el.className='node'; el.dataset.id=n.id; el.onclick=()=>nodeClick(n.id); el.onpointerdown=e=>onDown(e,n.id); dyn.appendChild(el); }
        el.style.left=p.x+'px'; el.style.top=p.y+'px'; el.textContent=n.label; el.classList.toggle('sel', selId===n.id); el.style.borderColor=t.cp.m;

        const plans = t.sols[n.id] || [];
        let dot = el.querySelector('.node-dot');
        if (plans.length > 0 && !dot) { dot=document.createElement('div'); dot.className='node-dot'; el.appendChild(dot); }
        else if (plans.length===0 && dot) dot.remove();
        if(dot) dot.style.background = t.cp.l;

        if (plans.length > 0 && !isConn) {
            plans.forEach((text, i) => {
                const step = (2*Math.PI)/plans.length, clAng = orbitAng + (i*step), dist=85;
                const cx = p.x + dist*Math.cos(clAng), cy = p.y + dist*Math.sin(clAng);
                let cl = document.querySelector(`.sol-cloud[data-id="${n.id}"][data-idx="${i}"]`);
                if(!cl) { cl=document.createElement('div'); cl.className='sol-cloud'; cl.dataset.id=n.id; cl.dataset.idx=i; cl.onclick=e=>{ e.stopPropagation(); openDetail(n.id); }; dyn.appendChild(cl); }
                cl.style.left=cx+'px'; cl.style.top=cy+'px'; cl.textContent=text.substring(0,20)+(text.length>20?'..':''); cl.style.borderColor=t.cp.m;
            });
        }
    });
    $('empty').style.display = t.nodes.length===0?'flex':'none';
    $('empty').style.left = c.x + 'px'; $('empty').style.top = c.y + 'px';
}

function switchT(idx) {
    if (idx < 0) return;
    if (idx >= tracks.length) tracks.push(mkT(`Track ${tracks.length+1}`));
    cur = idx; rotAng = 0; orbitAng = 0; applyTheme(); renderPager(); render(); sync();
}

function nodeClick(id) { 
    if (isConn) { if (!selId) { selId=id; $('conn-btn').textContent='Select target...'; } else if (selId!==id) { toggleConn(); } }
    else openDetail(id); 
}
function toggleConn() { isConn=!isConn; selId=null; $('conn-btn').classList.toggle('on',isConn); $('conn-btn').textContent=isConn?'Select Target':'Polarity Snap'; }
function openInject() { $('inj-ov').classList.add('open'); setTimeout(()=>$('node-inp').focus(),100); }
function closeInject() { $('inj-ov').classList.remove('open'); $('node-inp').value=''; }

function addNode() {
    const v = $('node-inp').value.trim(); if(!v) return;
    tracks[cur].nodes.push({id:Date.now(), label:v}); 
    distribute(); // FORCE EQUAL SPACING
    closeInject(); // IMMEDIATE RETURN
    render(); sync();
}

function onDown(e, id) { if(isConn) return; dragId=id; document.querySelector(`.node[data-id="${id}"]`).classList.add('dragging'); }
function onMove(e) { if(!dragId) return; const c=ctr(), dx = e.clientX-c.x, dy=e.clientY-c.y, n = tracks[cur].nodes.find(x=>x.id===dragId); if(n) { n.angle = Math.atan2(dy,dx)-rotAng; render(); } }
function onUp() { if(!dragId) return; document.querySelectorAll('.node').forEach(n=>n.classList.remove('dragging')); dragId=null; distribute(); sync(); }

/* ABSOLUTE EQUAL DISTRIBUTION LOGIC */
function distribute() {
    const t = tracks[cur];
    if (t.nodes.length === 0) { t.conns = []; return; }
    // Sort nodes by current angle to maintain general layout if possible
    t.nodes.sort((a, b) => (a.angle || 0) - (b.angle || 0));
    t.nodes.forEach((n, i) => { n.angle = (i / t.nodes.length) * 2 * Math.PI; });
    if (t.nodes.length > 1) {
        t.conns = t.nodes.map((n, i) => {
            const existing = t.conns.find(c => c.s === n.id);
            return { id: `c-${n.id}`, s: n.id, t: t.nodes[(i + 1) % t.nodes.length].id, type: existing ? existing.type : 'S' };
        });
    } else t.conns = [];
}

function openDetail(id) { detId=id; const n=tracks[cur].nodes.find(x=>x.id===id); $('det-name').textContent=n.label; refreshPlans(); $('detail-view').classList.add('open'); }
function closeDetail() { $('detail-view').classList.remove('open'); render(); }
function refreshPlans() { const l=$('plan-list'); l.innerHTML=''; (tracks[cur].sols[detId]||[]).forEach((p,i)=>{ const d=document.createElement('div'); d.style.background='var(--bg2)'; d.style.padding='10px'; d.style.borderRadius='8px'; d.style.marginBottom='6px'; d.style.fontSize='12px'; d.textContent=p; l.appendChild(d); }); }
function addPlan() { const v=$('plan-inp').value.trim(); if(!v) return; if(!tracks[cur].sols[detId]) tracks[cur].sols[detId]=[]; tracks[cur].sols[detId].push(v); $('plan-inp').value=''; refreshPlans(); render(); sync(); }
function delNode() { if(!confirm('削除しますか？')) return; tracks[cur].nodes=tracks[cur].nodes.filter(x=>x.id!==detId); distribute(); closeDetail(); render(); sync(); }

function newTrack() { switchT(tracks.length); }
function alignOrbit() { rotAng=0; render(); }
function toggleRot() { isRot=!isRot; $('rot-btn').textContent=isRot?'Stop':'Rotate'; }
function openReset() { $('reset-ov').classList.add('open'); }
function closeReset() { $('reset-ov').classList.remove('open'); }
function clearLoop() { tracks[cur]=mkT(tracks[cur].name); closeReset(); render(); sync(); }
function sync() { localStorage.setItem('nimoloop_v25_6_absolute', JSON.stringify(tracks)); }
function toast(msg) { const el=document.createElement('div'); el.className='toast'; el.textContent=msg; el.style.background=tracks[cur].cp.m; $('toasts').appendChild(el); setTimeout(()=>{el.remove()},2500); }
function typeHint() { let h=HINTS[Math.floor(Math.random()*HINTS.length)], i=0, el=$('hint-text'); el.textContent=''; function tick(){ if(i<h.length){ el.textContent+=h[i++]; setTimeout(tick, 250); } } tick(); }
</script>
</body>
